<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b141a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chat" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Pocket Chat</title>
    <script>
      // Apply saved theme/background before first paint to avoid a flash.
      try {
        var t = localStorage.getItem('pc_theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
        var b = localStorage.getItem('pc_chatbg');
        if (b) document.documentElement.setAttribute('data-chat-bg', b);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
